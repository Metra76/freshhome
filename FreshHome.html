// Simple key-value store using freshhome_kv table
window.storage = {
  get: async (key) => {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/freshhome_kv?key=eq.${encodeURIComponent(key)}&select=value`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Accept': 'application/json' } }
    );
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    if (!data.length) throw new Error('not found');
    return { key, value: data[0].value };
  },
  set: async (key, value) => {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/freshhome_kv`,
      {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Accept': 'application/json',
          'Prefer': 'resolution=merge-duplicates'
        },
        body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
      }
    );
    if (!res.ok) throw new Error('save failed');
    return { key, value };
  },
  delete: async (key) => {
    await fetch(
      `${SUPABASE_URL}/rest/v1/freshhome_kv?key=eq.${encodeURIComponent(key)}`,
      { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    return { key, deleted: true };
  }
};

// ─── TICKET PARSER ────────────────────────────────────────────────────────────
// Detecta líneas de producto: texto seguido de precio (con o sin % IVA)
// Ignora cabeceras, totales, separadores, info de pago, etc.

const IGNORE_PATTERNS = [/^-{3,}/, /^\*{3,}/, /^={3,}/,
// separadores
/^(iva|tipo|base|cuota|total|subtotal|cambio|pago|importe|unidades|numero|factura|nif|tel|cif|c\/|http|www|atendido|establecimiento|fil|operacion|tarjeta|autorizacion|comercio|terminal|acumula|del |cada |2627|gracias|no se|caducidad|autorizo|fecha|bolsa.*%|n[uú]mero|ticket)/i, /^descripci/i, /^desglose/i,
// cabeceras
/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/,
// fechas
/^[a-z0-9\s]{0,6}:\s/i // etiquetas tipo "Tel: xxx"
];
function parseTicket(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 3);
  const results = [];
  for (const line of lines) {
    if (IGNORE_PATTERNS.some(p => p.test(line))) continue;

    // Patrón 1 — cantidad múltiple: "PIZZA M 250 4 A 1,99 7,96 10,0"
    // Formato: NOMBRE qty LETRA precio subtotal IVA
    let m = line.match(/^(.+?)\s+(\d+)\s+[A-Z]\s+(\d{1,3}[,\.]\d{2})\s+\d{1,3}[,\.]\d{2}\s+\d+[,\.]?\d*\s*$/);
    if (m) {
      const name = m[1].trim();
      const qty = m[2];
      const priceStr = m[3];
      const price = parseFloat(priceStr.replace(",", "."));
      if (name.length >= 3 && price > 0 && price < 300 && !/^\d/.test(name)) {
        const cleanName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
        results.push({
          name: cleanName,
          price: priceStr.replace(",", "."),
          qty: parseInt(qty)
        });
      }
      continue;
    }

    // Patrón 2 — estándar: "NOMBRE precio IVA" o "NOMBRE precio"
    m = line.match(/^(.+?)\s+(\d{1,3}[,\.]\d{2})\s+\d{1,2}[,\.]?\d*\s*$/);
    if (!m) m = line.match(/^(.+?)\s+(\d{1,3}[,\.]\d{2})\s*(?:[A-Za-z*].*)?$/);
    if (m) {
      const name = m[1].trim();
      const priceStr = m[2];
      const price = parseFloat(priceStr.replace(",", "."));
      if (name.length >= 3 && price > 0 && price < 300 && !/^\d/.test(name)) {
        const cleanName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
        results.push({
          name: cleanName,
          price: priceStr.replace(",", "."),
          qty: 1
        });
      }
    }
  }
  return results;
}
